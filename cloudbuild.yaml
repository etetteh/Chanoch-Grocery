steps:
# Step 1: Build the container image
# This step uses the 'docker' builder to build your application's Docker image.
# It tags the image with the Cloud Run service name and the unique commit SHA.
# The '.' at the end indicates that the Dockerfile is in the current directory.
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/chanoch-grocery:$COMMIT_SHA', '.']

# Step 2: Push the container image to Artifact Registry
# This step pushes the newly built Docker image to Google Cloud Artifact Registry.
# Artifact Registry is the recommended place for storing your container images.
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/chanoch-grocery:$COMMIT_SHA']

# Step 3: Deploy the container image to Cloud Run
# This step uses the 'gcloud' builder to deploy the image to your Cloud Run service.
# It specifies the service name, the image to deploy, and the region.
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'chanoch-grocery' # Your Cloud Run service name
  - '--image'
  - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/chanoch-grocery:$COMMIT_SHA'
  - '--region'
  - 'northamerica-northeast2' # Your Cloud Run service region
  # Optional: If you need to allow unauthenticated access (like your current setup)
  - '--allow-unauthenticated'
  # Automate secret deployment using a Cloud Build substitution variable
  # This keeps the secret name out of your code. You define _SECRET_NAME in your Cloud Build Trigger.
  - '--set-secrets'
  - 'GEMINI_API_KEY=$_SECRET_NAME:latest'

# Substitution variables allow you to parameterize your build
substitutions:
  _SECRET_NAME: 'chanoch-grocery-api' # You can override this in your Cloud Build Trigger settings

# This section ensures that the image pushed in Step 2 is correctly associated with the build.
images:
- 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/chanoch-grocery:$COMMIT_SHA'
